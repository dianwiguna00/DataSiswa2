<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Absensi Sekolah</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-size:20px;
}


body{
    font-family:'Segoe UI',Tahoma,sans-serif;
    background:#eef2f7;
    color:#333;
}

.header{
    background:linear-gradient(135deg,#0d6efd,#0a58ca);
    color:#fff;
    text-align:center;
    padding:20px;
    font-size:26px;
    font-weight:600;
    letter-spacing:1px;
    box-shadow:0 4px 12px rgba(0,0,0,.15);
}

.container{
    max-width:1300px;
    margin:auto;
    padding:20px;
}

.card{
    background:#fff;
    border-radius:16px;
    padding:20px;
    margin-bottom:20px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.form-row{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
}

select,input{
    flex:1;
    min-width:150px;
    padding:12px;
    border:1px solid #d9dee5;
    border-radius:10px;
    font-size:20px;
}

select:focus,
input:focus{
    outline:none;
    border-color:#0d6efd;
    box-shadow:0 0 0 3px rgba(13,110,253,.2);
}

.button-group{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-top:15px;
}

button{
    border:none;
    border-radius:10px;
    padding:12px 16px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:translateY(-2px);
}

.btn-save{
    background:#198754;
    color:white;
}

.btn-edit{
    background:#ffc107;
    color:black;
}

.btn-clear{
    background:#dc3545;
    color:white;
}

.btn-download{
    background:#0d6efd;
    color:white;
}

.h{
    background:#198754;
    color:white;
}

.s{
    background:#ffc107;
}

.i{
    background:#0dcaf0;
    color:white;
}

.a{
    background:#dc3545;
    color:white;
}

.active{
    border:3px solid #000;
}

.stats{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:15px;
    margin-bottom:20px;
}

.stat-card{
    background:#fff;
    padding:20px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.stat-card h2{
    font-size:34px;
}

.stat-h h2{
    color:#198754;
}

.stat-s h2{
    color:#ffc107;
}

.stat-i h2{
    color:#0dcaf0;
}

.stat-a h2{
    color:#dc3545;
}

.kelas-box{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(90px,1fr));
    gap:8px;
    margin-top:15px;
}

.kelas-box label{
    background:#f8f9fa;
    border:1px solid #ddd;
    border-radius:10px;
    padding:10px;
}

.table-container{
    overflow:auto;
    border-radius:12px;
}

table{
    width:100%;
    min-width:900px;
    border-collapse:collapse;
}

th{
    background:#0d6efd;
    color:white;
    padding:12px;
    position:sticky;
    top:0;
}

td{
    padding:10px;
    border-bottom:1px solid #eee;
    text-align:center;
}

tr:nth-child(even){
    background:#f8f9fa;
}

tr:hover{
    background:#e9f2ff;
}

#rekapHarian{
    margin-top:15px;
    padding:15px;
    background:#e9f2ff;
    border-radius:10px;
    font-weight:bold;
}

@media(max-width:768px){

    .stats{
        grid-template-columns:repeat(2,1fr);
    }

    .button-group{
        flex-direction:column;
    }

    button{
        width:100%;
    }

    .header{
        font-size:20px;
    }
}
</style>
</head>

<body>

<div class="header">ABSENSI SISWA</div>

<div class="container">

<div class="stats">

    <div class="stat-card stat-h">
        <h2 id="jmlH">0</h2>
        <p>Hadir</p>
    </div>

    <div class="stat-card stat-s">
        <h2 id="jmlS">0</h2>
        <p>Sakit</p>
    </div>

    <div class="stat-card stat-i">
        <h2 id="jmlI">0</h2>
        <p>Izin</p>
    </div>

    <div class="stat-card stat-a">
        <h2 id="jmlA">0</h2>
        <p>Alpa</p>
    </div>

</div>

<div class="card">

<select id="kelas" onchange="render()">
<option>7A</option>
<option>7B</option>
<option>7C</option>
<option>7D</option>
<option>7E</option>
<option>7F</option>
<option>7G</option>
<option>7H</option>
<option>7I</option>
</select>

<input id="tgl" type="number" min="1" max="31">

<button class="btn-save" onclick="save()">Simpan</button>
<button class="btn-edit" onclick="editMode()">Edit/Simpan</button>
<button class="btn-clear" onclick="clearData()">Bersihkan</button>

<div class="kelas-box">
<label><input type="checkbox" value="7A" class="kelasDownload">7A</label>
<label><input type="checkbox" value="7B" class="kelasDownload">7B</label>
<label><input type="checkbox" value="7C" class="kelasDownload">7C</label>
<label><input type="checkbox" value="7D" class="kelasDownload">7D</label>
<label><input type="checkbox" value="7E" class="kelasDownload">7E</label>
<label><input type="checkbox" value="7F" class="kelasDownload">7F</label>
<label><input type="checkbox" value="7G" class="kelasDownload">7G</label>
<label><input type="checkbox" value="7H" class="kelasDownload">7H</label>
<label><input type="checkbox" value="7I" class="kelasDownload">7I</label>
</div>

<button class="btn-download" onclick="downloadCSV()">Download Gabungan</button>

</div>

<div class="card">

<div class="table-container">
<table>
<thead>
<tr>
<th>No</th>
<th>Nama</th>
<th>L/P</th>
<th>H</th>
<th>S</th>
<th>I</th>
<th>A</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

<div id="rekapHarian" style="font-weight:bold;"></div>
<div id="rekapBulanan"></div>

</div>

</div>

<script>

var edit = true;

// ✅ contoh data (lanjutkan)
var dataSiswa = [
{kelas:"7A",no:1,nama:"Achmad",jk:"L",absensi:{}},
{kelas:"7A",no:2,nama:"Adam",jk:"L",absensi:{}},
{kelas:"7A",no:3,nama:"Afiyah",jk:"P",absensi:{}},
{kelas:"7A",no:4,nama:"Agilah",jk:"P",absensi:{}},
{kelas:"7A",no:5,nama:"Farhan",jk:"L",absensi:{}},

{kelas:"7B",no:1,nama:"Yahya",jk:"L",absensi:{}},
{kelas:"7B",no:2,nama:"Aiman",jk:"L",absensi:{}},
{kelas:"7B",no:3,nama:"Arif",jk:"L",absensi:{}},
{kelas:"7B",no:4,nama:"Cantika",jk:"P",absensi:{}},
{kelas:"7B",no:5,nama:"Danang",jk:"L",absensi:{}}
];

// SAVE
function save(){
localStorage.setItem("absen", JSON.stringify(dataSiswa));
alert("Data tersimpan ✅");
}

// LOAD
function load(){
let d = localStorage.getItem("absen");
if(d) dataSiswa = JSON.parse(d);
}

// EDIT MODE
function editMode(){
edit = !edit;
alert(edit ? "Mode Edit Aktif" : "Mode Edit Nonaktif");
}

// CLEAR
function clearData(){
if(confirm("Hapus semua data absensi?")){
dataSiswa.forEach(d=>d.absensi={});
save();
render();
}
}

// AUTO HADIR
function autoHadir(){
let k = kelas.value;
let t = tgl.value;

dataSiswa.forEach(d=>{
if(d.kelas==k && !d.absensi[t]){
d.absensi[t] = "H";
}
});
}

// RENDER
function render(){

window.scrollTo(0,200);

let k = kelas.value;
let t = tgl.value;
if(!t) return;

autoHadir();

let tbody="";
let h=0,s=0,i=0,a=0;

dataSiswa.forEach((d,iIdx)=>{
if(d.kelas==k){

let st = d.absensi[t] || "H";

if(st=="H")h++;
if(st=="S")s++;
if(st=="I")i++;
if(st=="A")a++;

tbody+=`
<tr>
<td>${d.no}</td>
<td>${d.nama}</td>
<td>${d.jk}</td>
<td><button class="h ${st=='H'?'active':''}" onclick="set(${iIdx},'H')">H</button></td>
<td><button class="s ${st=='S'?'active':''}" onclick="set(${iIdx},'S')">S</button></td>
<td><button class="i ${st=='I'?'active':''}" onclick="set(${iIdx},'I')">I</button></td>
<td><button class="a ${st=='A'?'active':''}" onclick="set(${iIdx},'A')">A</button></td>
</tr>`;
}
});

document.getElementById("tbody").innerHTML = tbody;

// REKAP HARIAN
document.getElementById("rekapHarian").innerHTML =
"Tanggal "+t+" → H:"+h+" | S:"+s+" | I:"+i+" | A:"+a;
document.getElementById("jmlH").innerText = h;
document.getElementById("jmlS").innerText = s;
document.getElementById("jmlI").innerText = i;
document.getElementById("jmlA").innerText = a;

// REKAP BULANAN
buatRekapBulanan(k);

}

// SET
function set(i,status){

if(!edit){
alert("Aktifkan mode edit dulu!");
return;
}

let t = tgl.value;
dataSiswa[i].absensi[t] = status;

render();
}

// REKAP BULANAN
function buatRekapBulanan(k){

let dataKelas = dataSiswa
.filter(d=>d.kelas==k)
.map(d=>{

let s=0,i=0,a=0;

// hitung S I A
for(let t=1;t<=31;t++){
let st = d.absensi[t] || "H";
if(st=="S") s++;
if(st=="I") i++;
if(st=="A") a++;
}

// hitung hadir
let totalTidak = s+i+a;
let hadir = 31 - totalTidak;

// persen kehadiran
let persen = Math.round((hadir/31)*100);

return {
...d,
jmlS:s,
jmlI:i,
jmlA:a,
persen:persen
};

});

// ✅ ranking (descending)
dataKelas.sort((a,b)=> b.persen - a.persen);

// ✅ ranking RAPAT (nilai sama = rank sama)
let rank = 1;

dataKelas.forEach((d,i)=>{

if(i > 0 && d.persen < dataKelas[i-1].persen){
rank++;  // naik hanya jika persen turun
}

d.rank = rank;

});

// ================= TAMPILKAN =================
let html = "<br><b>Rekap Bulanan</b><div class='table-container'><table><tr><th>No</th><th>Nama</th>";

// kolom tanggal
for(let t=1;t<=31;t++){
html += "<th>"+t+"</th>";
}

// tambahan
html += "<th>S</th><th>I</th><th>A</th><th>%</th><th>Rank</th></tr>";

// isi
dataKelas.forEach(d=>{

html += "<tr><td>"+d.no+"</td><td>"+d.nama+"</td>";

for(let t=1;t<=31;t++){
let st = d.absensi[t] || "H";
html += "<td>"+(st=="H"?"":st)+"</td>";
}

html+=`
<td>${d.jmlS}</td>
<td>${d.jmlI}</td>
<td>${d.jmlA}</td>
<td>${d.persen}%</td>
<td>${d.rank}</td>
`;

html += "</tr>";

});

html += "</table></div>";

document.getElementById("rekapBulanan").innerHTML = html;

}

// DOWNLOAD
function downloadCSV(){

let kelasDipilih = [];
document.querySelectorAll(".kelasDownload:checked")
.forEach(cb => kelasDipilih.push(cb.value));

if(kelasDipilih.length===0){
alert("Pilih kelas dulu!");
return;
}

let csv = "";

// ================= HEADER =================
csv += "DATA ABSENSI SISWA\n";

// ================= DATA =================
kelasDipilih.forEach(k=>{

csv += "KELAS " + k + "\n";
csv += "NO;NAMA;L/P;";

for(let i=1;i<=31;i++) csv += i + ";";
csv += "S;I;A\n";

dataSiswa
.filter(d=>d.kelas==k)
.forEach(d=>{

let row = `${d.no};${d.nama};${d.jk};`;

let s=0,i=0,a=0;

for(let t=1;t<=31;t++){
let st = d.absensi[t] || "H";

if(st=="S") s++;
if(st=="I") i++;
if(st=="A") a++;

row += st + ";";
}

row += `${s};${i};${a}`;

csv += row + "\n";

});

});

// ================= ANDROID =================
Android.downloadCSV(csv);

}

// START
window.onload=function(){

load();

let today=new Date().getDate();
document.getElementById("tgl").value=today;

render();

}

</script>

</body>
</html>
